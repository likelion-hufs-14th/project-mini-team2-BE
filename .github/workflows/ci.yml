name: CI - Django Check

on:
    pull_request:
        branches: [main]

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install system dependencies
              run: sudo apt-get update && sudo apt-get install -y libmysqlclient-dev pkg-config

            - name: Install dependencies
              run: pip install -r inciner/requirements.txt

            - name: Create .env
              run: echo "${{ secrets.ENV_FILE }}" > inciner/.env

            - name: Django system check
              run: python inciner/manage.py check
